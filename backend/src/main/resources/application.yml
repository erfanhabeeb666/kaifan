server:
  port: 8080

spring:
  application:
    name: kaifan-callqueue

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:kaifan_callqueue}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:StrongPassword@123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:kaifan-restaurant-call-queue-management-system-secret-key-2024-very-long-secret}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  exotel:
    api-key: ${EXOTEL_API_KEY:9880056158a814891fbf46c0ace64067062558ee78dd9695}
    api-token: ${EXOTEL_API_TOKEN:a181d1f354a8683d06e591e917227c6975a8e9d898cc386a}
    subdomain: ${EXOTEL_SUBDOMAIN:api.exotel.com}
    account-sid: ${EXOTEL_ACCOUNT_SID:kaifankuzhimandhi1}
    caller-id: ${EXOTEL_CALLER_ID:+911234567890}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.kaifan.callqueue: DEBUG
    org.springframework.security: INFO
