server:
  port: 8080

spring:
  application:
    name: kaifan-callqueue

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:kaifan_callqueue}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:StrongPassword@123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:kaifan-restaurant-call-queue-management-system-secret-key-2024-very-long-secret}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  exotel:
    api-key: ${EXOTEL_API_KEY:2e5c8c78e7652c5ead6d30ead8a54452d8941a0d715c7cae}
    api-token: ${EXOTEL_API_TOKEN:45db3f086ce33472bfb130743dd8393dda6f49964375c3c7}
    subdomain: ${EXOTEL_SUBDOMAIN:api.exotel.com}
    account-sid: ${EXOTEL_ACCOUNT_SID:kaifankuzhimandhi1}
    caller-id: ${EXOTEL_CALLER_ID:04954266665}
    # Specific Callback Flow App IDs for Employees.
    # Replace '1' and '2' with actual Employee IDs from the DB, and the default values with real Exotel Flow IDs.
    callback-app-id:
      1: ${EXOTEL_CALLBACK_APP_ID_1:1271196}
      2: ${EXOTEL_CALLBACK_APP_ID_2:2222222}

  petpooja:
    enabled: ${PETPOOJA_ENABLED:false}
    base-url: ${PETPOOJA_BASE_URL:https://developerapi.petpooja.com}
    app-key: ${PETPOOJA_APP_KEY:}
    app-secret: ${PETPOOJA_APP_SECRET:}
    access-token: ${PETPOOJA_ACCESS_TOKEN:}
    restaurant-id: ${PETPOOJA_RESTAURANT_ID:}
    endpoints:
      fetch-menu: ${PETPOOJA_FETCH_MENU_PATH:/thirdpartyint/4/get_menu}
      save-order: ${PETPOOJA_SAVE_ORDER_PATH:/thirdpartyint/4/save_order}
    menu-sync-interval-minutes: ${PETPOOJA_MENU_SYNC_INTERVAL:30}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.kaifan.callqueue: DEBUG
    org.springframework.security: INFO
